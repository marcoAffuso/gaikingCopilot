<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logout Applicazione</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/sessionPages.css}" href="/css/sessionPages.css">
    <script th:src="@{/js/logout.js}" src="/js/logout.js" defer></script>
</head>
<body>
    <main class="session-shell d-flex align-items-center py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    <div class="card session-card border-0">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <span class="session-icon bg-warning-subtle text-warning-emphasis mb-3">
                                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                                </span>
                                <h1 class="h3 fw-bold mb-2">Logout applicazione</h1>
                                <p class="text-secondary mb-0">
                                    Uscendo dall'applicazione verranno chiuse la sessione locale e l'autorizzazione GitHub, se presente.
                                </p>
                            </div>

                            <div id="logoutStatusBox" class="alert alert-light border d-flex align-items-start gap-3 mb-4">
                                <i id="logoutStatusIcon" class="bi bi-info-circle text-primary mt-1" aria-hidden="true"></i>
                                <div>
                                    <div class="fw-semibold mb-1">Conferma richiesta</div>
                                    <output id="logoutMessage" class="d-block text-secondary mb-0" aria-live="polite">
                                        Premi il pulsante per completare il logout generale dell'applicazione.
                                    </output>
                                </div>
                            </div>

                            <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                                <button id="confirmLogoutBtn" type="button" class="btn btn-danger btn-lg px-4">
                                    <span id="logoutSpinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                                    <span>Esci dall'applicazione</span>
                                </button>
                                <a class="btn btn-outline-secondary btn-lg px-4" href="/api/copilot/auth/login">
                                    Torna al login GitHub
                                </a>
                            </div>

                            <p class="small text-secondary text-center mt-4 mb-0">
                                Endpoint canonico usato dal frontend: <strong>/api/session/logout</strong>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
