<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>New Project</title>

		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous">

		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/css/createNewProjectTa.css}" href="/css/createNewProjectTa.css">
	</head>
	<body class="d-flex flex-column min-vh-100">

		<header id="header">
			<nav class="navbar home-navbar">
				<div class="container-fluid justify-content-center">
					<div class="navbar-content">
						<div class="nav-left-group">
							<a class="btn btn-outline-primary home-button" href="/homePage" th:href="@{/homePage}">
								<i class="bi bi-house-door me-2" aria-hidden="true"></i>
								Home
							</a>
							<span class="page-label">Create New Project TA</span>
						</div>
						<div class="d-flex align-items-center justify-content-center gap-3 brand-sequence">
							<img
								class="brand-logo gaiking-logo"
								src="/images/gaiking.jpg"
								th:src="@{/images/gaiking.jpg}"
								alt="Gaiking Logo">
							<h1 class="brand-title">GaikingCopilot</h1>
							<img
								class="brand-logo"
								src="/images/gitHubCopilot.png"
								th:src="@{/images/gitHubCopilot.png}"
								alt="GitHub Copilot Logo">
						</div>
						<a class="btn btn-outline-danger logout-button" href="/logout" th:href="@{/logout}">
							<i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>
							Logout
						</a>
					</div>
				</div>
			</nav>
		</header>

		<section id="section" class="page-footer home-section">
			<div class="container">
				<div class="d-flex align-items-center justify-content-center section-content">
				</div>
			</div>
		</section>

		<footer id="footer" class="footer py-2 bg-light page-footer">
			<div class="container">
				<div class="d-flex align-items-center justify-content-center footer-content">
					<img
						src="/images/nttdatalogo.png"
						th:src="@{/images/nttdatalogo.png}"
						alt="NTT Data logo"
						class="me-3 footer-logo">
					<p class="mb-0">&copy; [[ ${#dates.format(#dates.createNow(), 'yyyy')} ]] NTT Data</p>
				</div>
			</div>
		</footer>

		<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>

	</body>
</html>
