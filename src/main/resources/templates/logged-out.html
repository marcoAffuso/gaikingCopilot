<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logout Completato</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/sessionPages.css}" href="/css/sessionPages.css">
</head>
<body>
    <main class="session-shell d-flex align-items-center py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-7 col-xl-6">
                    <div class="card session-card border-0 text-center">
                        <div class="card-body p-4 p-md-5">
                            <span class="session-icon bg-success-subtle text-success-emphasis mb-3">
                                <i class="bi bi-check-circle" aria-hidden="true"></i>
                            </span>

                            <h1 class="h3 fw-bold mb-2">Logout completato</h1>
                            <p class="text-secondary mb-4" th:text="${message}">
                                Hai effettuato il logout correttamente.
                            </p>

                            <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                                <a class="btn btn-primary btn-lg px-4" href="/api/copilot/auth/login">
                                    Accedi di nuovo
                                </a>
                                <a class="btn btn-outline-secondary btn-lg px-4" href="/logout">
                                    Torna alla pagina logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
