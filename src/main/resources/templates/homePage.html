<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Autenticazione GitHub</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

        <style>
            body {
                margin: 0;
            }

            .home-navbar {
                border: 3px solid #1f2a44;
                border-radius: 14px;
                margin: 0.4rem 0.75rem 0.2rem;
                background: linear-gradient(90deg, #f4f7fb 0%, #eef4ff 100%);
                box-shadow: 0 6px 18px rgba(31, 42, 68, 0.18);
            }

            .page-footer {
                border: 3px solid #1f2a44;
                border-radius: 14px;
                margin: 1.25rem;
                background: linear-gradient(90deg, #f4f7fb 0%, #eef4ff 100%);
                box-shadow: 0 6px 18px rgba(31, 42, 68, 0.18);
                color: #1f2a44;
            }

            .footer-logo {
                width: 50px;
                height: 50px;
                object-fit: contain;
            }

            .footer-content {
                min-height: 58px;
            }

            .home-section {
                margin: 0.2rem 0.75rem;
                padding: 1rem;
                flex: 1 0 auto;
                display: flex;
            }

            .section-content {
                min-height: 100%;
                flex: 1 0 auto;
            }

            .action-box {
                width: min(100%, 720px);
                padding: 1.5rem;
                border: 3px solid #1f2a44;
                border-radius: 14px;
                background: linear-gradient(90deg, #f4f7fb 0%, #eef4ff 100%);
                box-shadow: 0 6px 18px rgba(31, 42, 68, 0.18);
            }

            .action-box-title {
                margin-bottom: 1.25rem;
                font-family: "Bebas Neue", sans-serif;
                font-size: 2rem;
                letter-spacing: 1.2px;
                color: #1f2a44;
                text-align: center;
            }

            .action-buttons {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 1rem;
            }

            .action-button {
                min-height: 82px;
                border-radius: 12px;
                border: 2px solid transparent;
                font-weight: 700;
                box-shadow: 0 6px 14px rgba(31, 42, 68, 0.14);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                text-decoration: none;
            }

            .action-button-project {
                background-color: #e8f7ef;
                border-color: #1f7a4c;
                color: #14532d;
            }

            .action-button-project:hover,
            .action-button-project:focus {
                background-color: #d7f0e3;
                border-color: #17643e;
                color: #14532d;
            }

            .action-button-test {
                background-color: #fff2db;
                border-color: #c77700;
                color: #8a4b00;
            }

            .action-button-test:hover,
            .action-button-test:focus {
                background-color: #ffe8c2;
                border-color: #a96300;
                color: #8a4b00;
            }

            .action-button-tool {
                background-color: #e6efff;
                border-color: #2f5fbf;
                color: #1f3f8f;
            }

            .action-button-tool:hover,
            .action-button-tool:focus {
                background-color: #d7e5ff;
                border-color: #274f9f;
                color: #1f3f8f;
            }

            .home-section .container {
                display: flex;
                flex: 1 0 auto;
            }

            #footer.page-footer {
                margin-top: 0.2rem;
                margin-right: 0.75rem;
                margin-bottom: 0.4rem;
                margin-left: 0.75rem;
            }

            .navbar-content {
                position: relative;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 0.5rem 7.5rem;
            }

            .brand-sequence {
                min-height: 78px;
            }

            .brand-logo {
                height: 64px;
                width: auto;
                object-fit: contain;
            }

            .gaiking-logo {
                height: 84px;
                padding: 4px;
                border: 2px solid #0f172a;
                border-radius: 12px;
                background-color: #ffffff;
                box-shadow: 0 8px 18px rgba(15, 23, 42, 0.3);
            }

            .brand-title {
                margin: 0;
                font-family: "Bebas Neue", sans-serif;
                font-size: 2.2rem;
                letter-spacing: 1.5px;
                color: #1f2a44;
                line-height: 1;
            }

            .logout-button {
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                border-radius: 999px;
                min-height: 96px;
                padding: 0 1.6rem;
                font-weight: 600;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 6px 14px rgba(220, 53, 69, 0.18);
            }

            .logout-button i {
                font-size: 1.1rem;
            }

            @media (max-width: 576px) {
                .navbar-content {
                    flex-direction: column;
                    gap: 0.75rem;
                    padding: 0.75rem 1rem;
                }

                .brand-logo {
                    height: 50px;
                }

                .gaiking-logo {
                    height: 64px;
                    padding: 3px;
                }

                .brand-title {
                    font-size: 1.6rem;
                    letter-spacing: 1px;
                }

                .action-box {
                    padding: 1rem;
                }

                .action-box-title {
                    font-size: 1.6rem;
                }

                .action-buttons {
                    grid-template-columns: 1fr;
                }

                .logout-button {
                    position: static;
                    transform: none;
                    min-height: 74px;
                    padding: 0 1.25rem;
                }
            }
        </style>

    </head>
    <body class="d-flex flex-column min-vh-100">

        <header id="header">
            <nav class="navbar home-navbar">
                <div class="container-fluid justify-content-center">
                    <div class="navbar-content">
                        <div class="d-flex align-items-center justify-content-center gap-3 brand-sequence">
                            <img
                                class="brand-logo gaiking-logo"
                                src="/images/gaiking.jpg"
                                th:src="@{/images/gaiking.jpg}"
                                alt="Gaiking Logo">
                            <h1 class="brand-title">GaikingCopilot</h1>
                            <img
                                class="brand-logo"
                                src="/images/gitHubCopilot.png"
                                th:src="@{/images/gitHubCopilot.png}"
                                alt="GitHub Copilot Logo">
                        </div>
                        <a class="btn btn-outline-danger logout-button" href="/logout" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>
                            Logout
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <section id="section" class="page-footer home-section">
            <div class="container">
                <div class="d-flex align-items-center justify-content-center section-content">
                    <div class="action-box">
                        <h2 class="action-box-title">Workspace Actions</h2>
                        <div class="action-buttons">
                            <a id="createNewProjectTaBtn" class="btn action-button action-button-project" href="/homePage/createNewProjectTa" th:href="@{/homePage/createNewProjectTa}">Create New Project TA</a>
                            <a id="generateTestCaseBtn" class="btn action-button action-button-test" href="/homePage/generateTestCase" th:href="@{/homePage/generateTestCase}">Generate Test Case</a>
                            <a id="toolManagementBtn" class="btn action-button action-button-tool" href="/homePage/toolManagement" th:href="@{/homePage/toolManagement}">Tool Management</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer id="footer" class="footer py-2 bg-light page-footer">
            <div class="container">
                <div class="d-flex align-items-center justify-content-center footer-content">
                    <img
                        src="/images/nttdatalogo.png"
                        th:src="@{/images/nttdatalogo.png}"
                        alt="NTT Data logo"
                        class="me-3 footer-logo">
                    <p class="mb-0">&copy; [[ ${#dates.format(#dates.createNow(), 'yyyy')} ]] NTT Data</p>
                </div>
            </div>
        </footer>

        <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    </body>
</html>
